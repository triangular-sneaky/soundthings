---
params:
  - &voice_num 1 # 1-based
  - &age 2
  - &l 3
  - &t 4
  - &r 5
  - &b 6
  - &area 7
  - &amp 8
  - &angle_norm_01 9
  - &id 10
  - &eff_amp 11
  - &x01 12
  - &y01 13
  - &cluster_index 14 # 0-based
  - &voice_index_in_cluster 15 # 0-based
  - &x01_in_cluster 16
  - &y01_in_cluster 17
  - &xy_order01_in_cluster 18
cc_sets:
  - &default_cc_set
    # - param: *age 
    #   max: 300 
    # - param: *area 
    #   max: 32
    # - param: *amp  
    #   max: 10.0
    - param: *eff_amp  
      max: 10.0
    - param: *angle_norm_01 
      max: 1.0
    - param: *x01_in_cluster 
      max: 1.0
    - param: *y01_in_cluster 
      max: 1.0
    - param: *xy_order01_in_cluster
      max: 1.0
modulation_templates:
  notes:
    - &C3 60
  default_pitch: &default_pitch
    param: *xy_order01_in_cluster
    min: 48
    max: 84
clusterModulations:
  # NOTE: register all params (including pitch.param) in corresponding cc set!
  0:
    pitch: *default_pitch
      # param: *xy_order01_in_cluster
      # min: 48
      # max: 84
      # max: 108
    at: *eff_amp
    ccs: *default_cc_set
    cc_base: 20
    cc_step: 5
  1:
    pitch: *default_pitch
      # param: *xy_order01_in_cluster
      # min: 46
      # max: 108
    at: *eff_amp
    ccs: *default_cc_set
    cc_base: 20
    cc_step: 5
  2:
    pitch: *default_pitch

    at: *eff_amp
    ccs: *default_cc_set
    cc_base: 20
    cc_step: 5
  3:
    pitch: 
      param: *xy_order01_in_cluster
      min: 36
      max: 60
    at: *eff_amp
    ccs: *default_cc_set
    cc_base: 20
    cc_step: 5
  4:
    pitch: *default_pitch
    at: *eff_amp
    ccs: *default_cc_set
    cc_base: 20
    cc_step: 5
